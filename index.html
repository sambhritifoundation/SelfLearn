<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelfLearn — Practice-first Learning</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --primary:#4f46e5; --primary-dark:#3730a3; --primary-light:#eef2ff;
    --accent:#f59e0b; --accent-light:#fef3c7;
    --green:#16a34a; --green-light:#dcfce7;
    --red:#dc2626; --red-light:#fee2e2;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Noto Sans','Noto Sans Devanagari',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
  .hi{display:none}
  body.lang-hi .hi{display:inline}
  body.lang-hi .en{display:none}
  .appnav{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .appnav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 24px;flex-wrap:wrap}
  .logo{font-size:1.25rem;font-weight:800;color:var(--primary);cursor:pointer;letter-spacing:-.5px}
  .logo span{color:var(--accent)}
  .navlinks{display:flex;gap:4px;flex:1}
  .navlinks button{border:0;background:none;padding:8px 14px;border-radius:8px;font-size:.9rem;color:var(--muted);cursor:pointer;font-weight:600}
  .navlinks button:hover{background:var(--primary-light);color:var(--primary)}
  .lang-switch{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .lang-switch button{border:0;background:var(--card);padding:6px 14px;font-size:.85rem;cursor:pointer;font-weight:700;color:var(--muted)}
  .lang-switch button.active{background:var(--primary);color:#fff}
  #app{max-width:1100px;margin:0 auto;padding:26px 24px 70px}
  .crumb{font-size:.82rem;color:var(--muted);margin-bottom:16px}
  .crumb a{color:var(--primary);cursor:pointer;text-decoration:none}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:860px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px}
  .btn{display:inline-block;border:0;background:var(--primary);color:#fff;padding:10px 20px;border-radius:9px;font-size:.93rem;font-weight:700;cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--primary-dark)}
  .btn.ghost{background:var(--primary-light);color:var(--primary)}
  .btn.warn{background:var(--accent);color:#3b2b00}
  .btn.green{background:var(--green)}
  .btn.sm{padding:6px 13px;font-size:.84rem}
  .btn.danger{background:var(--red-light);color:var(--red)}
  .chip{display:inline-block;background:var(--primary-light);color:var(--primary);border-radius:99px;padding:2px 11px;font-size:.74rem;font-weight:700;margin-right:5px}
  .chip.amber{background:var(--accent-light);color:#92400e}
  .chip.green{background:var(--green-light);color:var(--green)}
  .chip.red{background:var(--red-light);color:var(--red)}
  .chip.grey{background:var(--line);color:var(--muted)}
  h1{font-size:1.6rem;letter-spacing:-.4px} h2{font-size:1.2rem;margin-bottom:8px} h3{font-size:1rem}
  .sub{color:var(--muted);font-size:.9rem}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
  .bar i{display:block;height:100%;background:var(--primary);border-radius:99px}
  .bar i.g{background:var(--green)} .bar i.a{background:var(--accent)} .bar i.r{background:var(--red)}
  .hero{background:linear-gradient(120deg,var(--primary),#6d28d9);color:#fff;border-radius:16px;padding:30px;margin-bottom:22px}
  .hero h1{color:#fff;margin-bottom:6px}
  .hero p{opacity:.9;max-width:600px}
  .clickable{cursor:pointer;transition:box-shadow .15s}
  .clickable:hover{box-shadow:0 6px 20px rgba(79,70,229,.15);border-color:var(--primary)}
  .rowflex{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .notes{white-space:pre-wrap;font-size:.97rem}
  .notes table{border-collapse:collapse;margin:4px 0;width:100%;white-space:normal}
  .notes th,.notes td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top;font-size:.93rem}
  .notes th{background:var(--bg);color:var(--primary)}
  .notes tr:nth-child(even) td{background:var(--bg)}
  .diagram{margin:14px 0;text-align:center;overflow-x:auto}
  .diagram svg{max-width:100%;height:auto}
  .option{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:10px;padding:13px 15px;font-size:.96rem;cursor:pointer;margin-bottom:9px;font-family:inherit;color:var(--ink)}
  .option:hover:not(:disabled){border-color:var(--primary)}
  .option.correct{border-color:var(--green);background:var(--green-light)}
  .option.wrong{border-color:var(--red);background:var(--red-light)}
  .option:disabled{cursor:default}
  .explain{border-radius:10px;padding:13px 15px;margin-top:12px}
  .explain.ok{background:var(--green-light);border:1px solid var(--green)}
  .explain.no{background:var(--red-light);border:1px solid var(--red)}
  .qdots{display:flex;gap:5px;flex-wrap:wrap}
  .qdots i{width:22px;height:6px;border-radius:99px;background:var(--line)}
  .qdots i.done{background:var(--primary)} .qdots i.ok{background:var(--green)} .qdots i.bad{background:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th{text-align:left;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}
  input[type=text],select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:.92rem;font-family:inherit;background:var(--card)}
  textarea{resize:vertical}
  .score-ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
  .score-ring>div{width:104px;height:104px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-ring b{font-size:1.5rem}
  .stat{text-align:center}
  .stat b{font-size:1.4rem;display:block}
  .tabbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tabbar button{border:1px solid var(--line);background:var(--card);padding:7px 15px;border-radius:8px;font-size:.86rem;cursor:pointer;font-weight:600;color:var(--muted)}
  .tabbar button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 22px;border-radius:9px;font-size:.9rem;z-index:200;display:none}
  .shortinput{border:2px solid var(--line);border-radius:10px;padding:12px;font-size:1rem;width:100%}
  .lvl{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:800;margin:14px 0 6px}
</style>
</head>
<body>
<nav class="appnav"><div class="appnav-inner">
  <div class="logo" onclick="go('home')">Self<span>Learn</span></div>
  <div class="navlinks">
    <button onclick="go('home')"><span class="en">Learn</span><span class="hi">सीखें</span></button>
    <button onclick="go('dashboard')"><span class="en">My Progress</span><span class="hi">मेरी प्रगति</span></button>
    <button onclick="go('admin')">Admin</button>
  </div>
  <div class="lang-switch">
    <button id="btnEn" class="active" onclick="setLang('en')">EN</button>
    <button id="btnHi" onclick="setLang('hi')">हिं</button>
  </div>
</div></nav>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="data-accountancy.js"></script>
<script src="data-english.js"></script>
<script>
"use strict";
/* ================= helpers ================= */
var LANG = localStorage.getItem("sl_lang") || "en";
function sp(en, hi){ return '<span class="en">'+en+'</span><span class="hi">'+(hi||en)+'</span>'; }
function t(obj){ return obj ? (obj[LANG] || obj.en || "") : ""; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
/* Lightweight markdown for topic notes: **bold**, *italic*, | tables | */
function fmtNotes(txt){
  var lines = esc(txt).split("\n"), out = [], i = 0;
  function cells(row){ return row.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(function(c){ return c.trim(); }); }
  while(i < lines.length){
    if(/^\s*\|.*\|\s*$/.test(lines[i]) && i+1 < lines.length && /^\s*\|[\s\-–—|:]+\|\s*$/.test(lines[i+1])){
      var hdr = cells(lines[i]); i += 2; var rows = [];
      while(i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ rows.push(cells(lines[i])); i++; }
      out.push('<table><thead><tr>' + hdr.map(function(c){ return '<th>'+c+'</th>'; }).join("")
        + '</tr></thead><tbody>' + rows.map(function(r){ return '<tr>'+r.map(function(c){ return '<td>'+c+'</td>'; }).join("")+'</tr>'; }).join("") + '</tbody></table>');
    } else { out.push(lines[i]); i++; }
  }
  return out.join("\n").replace(/\n?(<table>)/g,"$1").replace(/(<\/table>)\n?/g,"$1")
    .replace(/\*\*([^*\n]+)\*\*/g,"<b>$1</b>").replace(/\*([^*\n]+)\*/g,"<i>$1</i>");
}
/* Inline SVG diagram registry — theme-aware (CSS vars) and bilingual (rebuilt on language toggle). */
var DIAGRAMS = {
  "acc-process": function(L){
    var d=function(a,b){return L==="hi"?b:a;};
    var box=function(x,n,lab,sub){
      return '<rect x="'+x+'" y="42" width="140" height="66" rx="10" fill="var(--card)" stroke="var(--primary)" stroke-width="2"/>'
        +'<circle cx="'+(x+22)+'" cy="64" r="13" fill="var(--primary)"/>'
        +'<text x="'+(x+22)+'" y="69" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">'+n+'</text>'
        +'<text x="'+(x+86)+'" y="68" text-anchor="middle" font-size="15" font-weight="bold" fill="var(--ink)">'+lab+'</text>'
        +'<text x="'+(x+70)+'" y="94" text-anchor="middle" font-size="10.5" fill="var(--ink)" opacity="0.65">'+sub+'</text>';
    };
    var arr=function(x1,x2){return '<line x1="'+x1+'" y1="75" x2="'+x2+'" y2="75" stroke="var(--primary)" stroke-width="2" marker-end="url(#ahp)"/>';};
    return '<svg viewBox="0 0 660 150" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit">'
      +'<defs><marker id="ahp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--primary)"/></marker></defs>'
      +'<text x="330" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--primary)">'+d("The 4-step process of accounting","लेखांकन की 4-चरणीय प्रक्रिया")+'</text>'
      +box(10,"1",d("Identify","पहचान"),d("pick money events","धन-घटनाएँ चुनें"))
      +box(175,"2",d("Measure","मापन"),d("value in ₹","₹ में मूल्य"))
      +box(340,"3",d("Record","अभिलेखन"),d("date-wise","तिथि-क्रम में"))
      +box(505,"4",d("Communicate","संप्रेषण"),d("reports to users","उपयोगकर्ताओं को रिपोर्ट"))
      +arr(150,175)+arr(315,340)+arr(480,505)
      +'</svg>';
  },
  "acc-users": function(L){
    var d=function(a,b){return L==="hi"?b:a;};
    var pill=function(x,y,w,txt){
      return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="30" rx="15" fill="var(--card)" stroke="var(--line)" stroke-width="1.5"/>'
        +'<text x="'+(x+w/2)+'" y="'+(y+19)+'" text-anchor="middle" font-size="12" fill="var(--ink)">'+txt+'</text>';

      +'<rect x="250" y="30" width="160" height="42" rx="10" fill="var(--primary)"/>'
      +'<text x="330" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">'+d("Accounting Information","लेखांकन सूचना")+'</text>'
      +'<path d="M330,72 L330,88 L170,88 L170,104" fill="none" stroke="var(--line)" stroke-width="2"/>'
      +'<path d="M330,72 L330,88 L490,88 L490,104" fill="none" stroke="var(--line)" stroke-width="2"/>'
      +'<rect x="90" y="104" width="160" height="36" rx="9" fill="var(--card)" stroke="var(--green)" stroke-width="2"/>'
      +'<text x="170" y="127" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--ink)">'+d("Internal users","आंतरिक उपयोगकर्ता")+'</text>'
      +'<rect x="410" y="104" width="160" height="36" rx="9" fill="var(--card)" stroke="var(--amber)" stroke-width="2"/>'
      +'<text x="490" y="127" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--ink)">'+d("External users","बाहरी उपयोगकर्ता")+'</text>'
      +pill(100,155,140,d("Owners","स्वामी"))+pill(100,192,140,d("Management","प्रबंधन"))+pill(100,229,140,d("Employees","कर्मचारी"))
      +pill(420,155,140,d("Investors","निवेशक"))+pill(420,192,140,d("Banks / Lenders","बैंक / ऋणदाता"))+pill(420,229,140,d("Government","सरकार"))+pill(420,266,140,d("Customers","ग्राहक"))
      +'</svg>';
  },
  "acc-equation": function(L){
    var d=function(a,b){return L==="hi"?b:a;};
    return '<svg viewBox="0 0 580 260" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit">'
      +'<text x="290" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--primary)">'+d("The accounting equation always balances","लेखांकन समीकरण सदा संतुलित रहती है")+'</text>'
      +'<line x1="290" y1="60" x2="290" y2="175" stroke="var(--ink)" stroke-width="4"/>'
      +'<polygon points="260,205 320,205 290,175" fill="var(--ink)"/>'
      +'<rect x="245" y="205" width="90" height="8" rx="4" fill="var(--ink)"/>'
      +'<line x1="120" y1="60" x2="460" y2="60" stroke="var(--primary)" stroke-width="5" stroke-linecap="round"/>'
      +'<circle cx="290" cy="60" r="7" fill="var(--primary)"/>'
      +'<line x1="170" y1="60" x2="170" y2="105" stroke="var(--line)" stroke-width="2"/>'
      +'<rect x="110" y="105" width="120" height="46" rx="10" fill="var(--card)" stroke="var(--green)" stroke-width="2"/>'
      +'<text x="170" y="133" text-anchor="middle" font-size="15" font-weight="bold" fill="var(--ink)">'+d("Assets","संपत्तियाँ")+'</text>'
      +'<line x1="410" y1="60" x2="410" y2="105" stroke="var(--line)" stroke-width="2"/>'
      +'<rect x="330" y="105" width="160" height="46" rx="10" fill="var(--card)" stroke="var(--amber)" stroke-width="2"/>'
      +'<text x="410" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--ink)">'+d("Liabilities","दायित्व")+'</text>'
      +'<text x="410" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--ink)">+ '+d("Capital","पूंजी")+'</text>'
      +'<text x="290" y="243" text-anchor="middle" font-size="15" font-weight="bold" fill="var(--primary)">'+d("Assets = Liabilities + Capital","संपत्तियाँ = दायित्व + पूंजी")+'</text>'
      +'</svg>';
  },
  "gst-split": function(L){
    var d=function(a,b){return L==="hi"?b:a;};
    return '<svg viewBox="0 0 660 210" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit">'
      +'<defs><marker id="ahg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--primary)"/></marker></defs>'
      +'<text x="330" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--primary)">'+d("How GST splits on a ₹10,000 sale @ 18%","₹10,000 की बिक्री पर 18% GST कैसे बँटता है")+'</text>'
      +'<line x1="330" y1="36" x2="330" y2="200" stroke="var(--line)" stroke-width="1.5" stroke-dasharray="4 4"/>'
      +'<text x="165" y="50" text-anchor="middle" font-size="12.5" font-weight="bold" fill="var(--ink)">'+d("WITHIN a state","एक ही राज्य में")+'</text>'
      +'<rect x="95" y="58" width="140" height="38" rx="9" fill="var(--card)" stroke="var(--primary)" stroke-width="2"/>'
      +'<text x="165" y="82" text-anchor="middle" font-size="12" fill="var(--ink)">GST 18% = ₹1,800</text>'
      +'<line x1="140" y1="96" x2="105" y2="140" stroke="var(--primary)" stroke-width="2" marker-end="url(#ahg)"/>'
      +'<line x1="190" y1="96" x2="225" y2="140" stroke="var(--primary)" stroke-width="2" marker-end="url(#ahg)"/>'
      +'<rect x="40" y="143" width="130" height="44" rx="9" fill="var(--card)" stroke="var(--green)" stroke-width="2"/>'

      +'<text x="105" y="179" text-anchor="middle" font-size="10.5" fill="var(--ink)" opacity="0.7">'+d("to Centre","केंद्र को")+'</text>'
      +'<rect x="180" y="143" width="130" height="44" rx="9" fill="var(--card)" stroke="var(--green)" stroke-width="2"/>'
      +'<text x="245" y="162" text-anchor="middle" font-size="11.5" font-weight="bold" fill="var(--ink)">SGST ₹900</text>'
      +'<text x="245" y="179" text-anchor="middle" font-size="10.5" fill="var(--ink)" opacity="0.7">'+d("to State","राज्य को")+'</text>'
      +'<text x="495" y="50" text-anchor="middle" font-size="12.5" font-weight="bold" fill="var(--ink)">'+d("ACROSS states","राज्यों के बीच")+'</text>'
      +'<rect x="425" y="58" width="140" height="38" rx="9" fill="var(--card)" stroke="var(--primary)" stroke-width="2"/>'
      +'<text x="495" y="82" text-anchor="middle" font-size="12" fill="var(--ink)">GST 18% = ₹1,800</text>'
      +'<line x1="495" y1="96" x2="495" y2="140" stroke="var(--primary)" stroke-width="2" marker-end="url(#ahg)"/>'
      +'<rect x="420" y="143" width="150" height="44" rx="9" fill="var(--card)" stroke="var(--amber)" stroke-width="2"/>'
      +'<text x="495" y="162" text-anchor="middle" font-size="11.5" font-weight="bold" fill="var(--ink)">IGST ₹1,800</text>'
      +'<text x="495" y="179" text-anchor="middle" font-size="10.5" fill="var(--ink)" opacity="0.7">'+d("to Centre (shared)","केंद्र को (साझा)")+'</text>'
      +'</svg>';
  },
  "meena-evolution": function(L){
    var d=function(a,b){return L==="hi"?b:a;};
    var shop=function(cx,base,w,h,col){
      var x=cx-w/2;
      return '<polygon points="'+(x-8)+','+(base-h)+' '+(x+w+8)+','+(base-h)+' '+cx+','+(base-h-22)+'" fill="'+col+'"/>'
        +'<rect x="'+x+'" y="'+(base-h)+'" width="'+w+'" height="'+h+'" rx="4" fill="var(--card)" stroke="'+col+'" stroke-width="2"/>'
        +'<rect x="'+(cx-9)+'" y="'+(base-26)+'" width="18" height="26" rx="2" fill="'+col+'"/>';
    };
    return '<svg viewBox="0 0 660 195" xmlns="http://www.w3.org/2000/svg" style="font-family:inherit">'
      +'<defs><marker id="ahm" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ink)"/></marker></defs>'
      +'<text x="330" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--primary)">'+d("Meena didi's business grows with the course","मीना दीदी का व्यवसाय कोर्स के साथ बढ़ता है")+'</text>'
      +shop(110,150,64,46,"var(--primary)")+shop(330,150,86,64,"var(--line)")+shop(550,150,110,84,"var(--line)")

function todayStr(){ var d = new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function shuffle(a){ a = a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }

var SUBJECTS = (window.SL_DATA && window.SL_DATA.subjects) || [];
function customQuestions(){ try{ return JSON.parse(localStorage.getItem("sl_custom_questions")||"[]"); }catch(e){ return []; } }
function saveCustom(list){ localStorage.setItem("sl_custom_questions", JSON.stringify(list)); }
function allQuestions(){
  var base = (window.SL_DATA && window.SL_DATA.questions) || [];
  var custom = customQuestions();
  var map = {};
  base.forEach(function(q){ map[q.id] = q; });
  custom.forEach(function(q){ map[q.id] = q; });      // custom overrides builtin by id
  return Object.keys(map).map(function(k){ return map[k]; });
}
function pubQuestions(){ return allQuestions().filter(function(q){ return q.status === "published"; }); }
function subj(code){ return SUBJECTS.find(function(s){ return s.code===code; }); }
function chapter(s, no){ return s.chapters.find(function(c){ return c.no==no; }); }
function topicByCode(code){
  for(var i=0;i<SUBJECTS.length;i++) for(var j=0;j<SUBJECTS[i].chapters.length;j++){
    var tt = SUBJECTS[i].chapters[j].topics.find(function(x){ return x.code===code; });
    if(tt) return { subject:SUBJECTS[i], chapter:SUBJECTS[i].chapters[j], topic:tt };
  }
  return null;
}
function qForTopic(code){ return pubQuestions().filter(function(q){ return q.topic===code; }); }
function qForChapter(sc, no){ return pubQuestions().filter(function(q){ return q.subject===sc && q.chapter==no; }); }

/* ================= progress ================= */
function P(){ try{ return JSON.parse(localStorage.getItem("sl_progress")||"{}"); }catch(e){ return {}; } }
function saveP(p){ localStorage.setItem("sl_progress", JSON.stringify(p)); }
function record(q, ok){
  var p = P();
  p.attempts = p.attempts || {}; p.topics = p.topics || {}; p.days = p.days || {};
  var a = p.attempts[q.id] || {n:0,c:0}; a.n++; if(ok) a.c++; p.attempts[q.id]=a;
  var key = q.topic || (q.subject+"-ch"+q.chapter);
  var tp = p.topics[key] || {n:0,c:0}; tp.n++; if(ok) tp.c++; tp.last=Date.now(); p.topics[key]=tp;
  p.days[todayStr()] = (p.days[todayStr()]||0)+1;
  saveP(p);
}
function topicStats(code){ var p=P(); return (p.topics&&p.topics[code]) || null; }
function acc(st){ return st && st.n ? Math.round(100*st.c/st.n) : null; }
function streak(){
  var p=P(); var days=p.days||{}; var n=0; var d=new Date();
  if(!days[todayStr()]) d.setDate(d.getDate()-1);
  while(true){
    var k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(days[k]){ n++; d.setDate(d.getDate()-1); } else break;
  }
  return n;
}
function totalAttempts(){ var p=P(); var s=0; var a=p.attempts||{}; Object.keys(a).forEach(function(k){ s+=a[k].n; }); return s; }
function overallAcc(){ var p=P(); var n=0,c=0; var a=p.attempts||{}; Object.keys(a).forEach(function(k){ n+=a[k].n; c+=a[k].c; }); return n?Math.round(100*c/n):null; }
function subjectProgress(s){
  var total=0, done=0;
  s.chapters.forEach(function(c){ c.topics.forEach(function(tp){ total++; var st=topicStats(tp.code); if(st&&st.n>0) done++; }); });
  return { total:total, done:done, pct: total?Math.round(100*done/total):0 };
}
function weakTopics(){
  var p=P(); var out=[]; var tps=p.topics||{};
  Object.keys(tps).forEach(function(code){
    var st=tps[code]; var a2=acc(st);
    if(a2!==null && a2<70){ var info=topicByCode(code); if(info) out.push({code:code, info:info, acc:a2, n:st.n}); }
  });
  out.sort(function(x,y){ return x.acc-y.acc; });
  return out;
}

/* ================= QUIZ ENGINE ================= */
var QUIZ = null;
function startQuiz(scope, a, b){
  var qs, title, backTopic=null;
  if(scope==="topic"){
    qs = qForTopic(a);
    var info = topicByCode(a); title = info ? t(info.topic.name) : a; backTopic = a;
  } else {
    qs = qForChapter(a, b);
    var s = subj(a); var c = s && chapter(s,b);
    title = c ? (t(s.name)+" · "+t(c.name)) : a;
  }
  if(!qs.length){ toast(LANG==="hi"?"अभी प्रश्न उपलब्ध नहीं":"No questions available yet"); return; }
  QUIZ = { scope:scope, key: scope==="topic"?a:(a+"-ch"+b), title:title, backTopic:backTopic,
           qs: shuffle(qs).slice(0,8), i:0, results:[], answered:false, t0:Date.now() };
  go("quiz");
}
function vQuiz(){
  if(!QUIZ) return vHome();
  var q = QUIZ.qs[QUIZ.i];
  var dots = QUIZ.qs.map(function(_,k){
    var r = QUIZ.results[k];
    return '<i class="'+(r===true?"ok":(r===false?"bad":(k===QUIZ.i?"done":"")))+'"></i>';
  }).join("");
  var h = '<div style="max-width:680px;margin:0 auto">'
    + '<div class="rowflex" style="margin-bottom:12px"><div class="qdots">'+dots+'</div>'
    + '<span class="sub">'+sp("Question","प्रश्न")+' '+(QUIZ.i+1)+' / '+QUIZ.qs.length+'</span></div>'
    + '<div class="sub" style="margin-bottom:8px">'+esc(QUIZ.title)+'</div>'
    + '<div class="card">'
    + '<span class="chip">'+q.type.toUpperCase()+'</span><span class="chip amber">'+sp(q.diff,{easy:"आसान",medium:"मध्यम",hard:"कठिन"}[q.diff]||q.diff)+'</span>'
    + '<h2 style="margin-top:10px">'+esc(t(q.q))+'</h2><div style="margin-top:12px" id="qbody">';
  if(q.type==="mcq"){
    var letters=["A","B","C","D"];
    (q.opts[LANG]||q.opts.en).forEach(function(o,k){
      h += '<button class="option" id="opt'+k+'" onclick="answerMcq('+k+')"><b>'+letters[k]+'.</b> '+esc(o)+'</button>';
    });
  } else if(q.type==="tf"){
    h += '<button class="option" id="optT" onclick="answerTf(true)"><b>'+sp("TRUE","सही")+'</b></button>'
       + '<button class="option" id="optF" onclick="answerTf(false)"><b>'+sp("FALSE","गलत")+'</b></button>';
  } else {
    h += '<input class="shortinput" id="shortAns" placeholder="'+(LANG==="hi"?"उत्तर लिखें…":"Type your answer…")+'" onkeydown="if(event.key===\'Enter\')answerShort()">'
       + '<button class="btn" style="margin-top:10px" onclick="answerShort()">'+sp("Check","जाँचें")+'</button>';
  }
  h += '</div><div id="exp"></div>'
    + '<div class="rowflex" style="margin-top:16px">'
    + '<button class="btn ghost sm" onclick="quitQuiz()">← '+sp("Exit","बाहर")+'</button>'
    + '<button class="btn" id="nextBtn" style="display:none" onclick="nextQ()">'+sp("Next →","अगला →")+'</button>'
    + '</div></div></div>';
  return h;
}
function showExplanation(ok, q, extra){
  var el = document.getElementById("exp");
  el.innerHTML = '<div class="explain '+(ok?"ok":"no")+'"><b>'+(ok?(LANG==="hi"?"✅ सही!":"✅ Correct!"):(LANG==="hi"?"❌ सही नहीं।":"❌ Not quite."))+'</b> '
    + (extra||"") + esc(t(q.exp)) + '</div>';
  var nb = document.getElementById("nextBtn");
  nb.style.display = "inline-block";
  nb.innerHTML = QUIZ.i === QUIZ.qs.length-1 ? (LANG==="hi"?"परिणाम देखें →":"See results →") : (LANG==="hi"?"अगला →":"Next →");
}
function settle(ok, q, extra){
  QUIZ.results[QUIZ.i] = ok; QUIZ.answered = true;
  record(q, ok);
  showExplanation(ok, q, extra);
}
function answerMcq(k){
  if(QUIZ.answered) return;
  var q = QUIZ.qs[QUIZ.i];
  var correctIdx = {A:0,B:1,C:2,D:3}[q.correct];
  var ok = k===correctIdx;
  for(var i2=0;i2<4;i2++){ var o=document.getElementById("opt"+i2); if(o) o.disabled=true; }
  var chosen = document.getElementById("opt"+k); if(chosen) chosen.classList.add(ok?"correct":"wrong");

function answerTf(val){

  ["T","F"].forEach(function(x){ var o=document.getElementById("opt"+x); if(o) o.disabled=true; });
  var chosen = document.getElementById(val?"optT":"optF"); if(chosen) chosen.classList.add(ok?"correct":"wrong");

function answerShort(){

function saveQuestion(){

  };
  if(type==="mcq"){
    q.opts = {en:[gv("f_oen0"),gv("f_oen1"),gv("f_oen2"),gv("f_oen3")], hi:[gv("f_ohi0"),gv("f_ohi1"),gv("f_ohi2"),gv("f_ohi3")]};

var HEADERS = ["id","board","class","subject_code","chapter_no","topic_code","type","difficulty",
  "question_en","question_hi","option_a_en","option_b_en","option_c_en","option_d_en",
  "option_a_hi","option_b_hi","option_c_hi","option_d_hi","correct",
  "explanation_en","explanation_hi","tags","source","status"];
function qToRow(q){
  var oe = (q.opts&&q.opts.en)||["","","",""], oh=(q.opts&&q.opts.hi)||["","","",""];
  return [q.id, q.board, q.klass, q.subject, q.chapter, q.topic||"", q.type, q.diff,
    q.q.en, q.q.hi||"", oe[0]||"",oe[1]||"",oe[2]||"",oe[3]||"", oh[0]||"",oh[1]||"",oh[2]||"",oh[3]||"",
    String(q.correct), q.exp.en, q.exp.hi||"", (q.tags||[]).join(", "), q.source||"", q.status];
}
function rowToQ(r){
  function g(name){ var v=r[name]; return v==null?"":String(v).trim(); }
  var subjCode = g("subject_code"); if(!subjCode || !g("question_en")) return null;
  var q = { id:g("id"), board:g("board")||"CBSE", klass:g("class")||"11", subject:subjCode,
    chapter: parseInt(g("chapter_no"))||1, topic:g("topic_code"),
    type:(g("type")||"mcq").toLowerCase(), diff:(g("difficulty")||"medium").toLowerCase(),
    q:{en:g("question_en"), hi:g("question_hi")}, correct:g("correct"),
    exp:{en:g("explanation_en"), hi:g("explanation_hi")},
    tags:g("tags").split(",").map(function(x){return x.trim();}).filter(Boolean),
    source:g("source"), status:(g("status")||"draft").toLowerCase() };
  if(q.type==="mcq"){
    q.opts = {en:[g("option_a_en"),g("option_b_en"),g("option_c_en"),g("option_d_en")],
              hi:[g("option_a_hi"),g("option_b_hi"),g("option_c_hi"),g("option_d_hi")]};
    q.correct = q.correct.toUpperCase();
    if(["A","B","C","D"].indexOf(q.correct)<0) return null;
    if(q.opts.en.some(function(x){ return !x; })) return null;
  }
  if(q.type==="tf") q.correct = q.correct.toUpperCase();
  if(!q.correct || !q.exp.en) return null;
  return q;
}

function importFile(){
  var inp = document.getElementById("impFile");
  if(!inp.files || !inp.files[0]){ toast("Choose a file first"); return; }
  if(typeof XLSX === "undefined"){ toast("Spreadsheet library not loaded — check internet connection"); return; }
  var f = inp.files[0];
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(e.target.result, {type:"array"});
      var sheetName = wb.SheetNames.indexOf("Questions")>-1 ? "Questions" : wb.SheetNames[0];
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:""});
      var added=0, updated=0, skipped=0;
      var custom = customQuestions();
      var existingIds = {}; allQuestions().forEach(function(q){ existingIds[q.id]=true; });
      var counter = 1;
      rows.forEach(function(r){
        var q = rowToQ(r);
        if(!q){ skipped++; return; }
        if(!q.id){
          do { q.id = q.subject+"-I"+String(Date.now()%100000)+"-"+(counter++); } while(existingIds[q.id]);
        }
        var isUpdate = existingIds[q.id];
        custom = custom.filter(function(x){ return x.id!==q.id; });
        custom.push(q);
        existingIds[q.id]=true;
        if(isUpdate) updated++; else added++;
      });
      saveCustom(custom);
      document.getElementById("impReport").innerHTML =
        '<b>Import complete:</b> '+added+' added, '+updated+' updated, '+skipped+' skipped (missing/invalid required fields).';
      toast("Imported: "+added+" added, "+updated+" updated");
    }catch(err){
      document.getElementById("impReport").innerHTML = '<b style="color:var(--red)">Import failed:</b> '+esc(err.message);
    }
  };
  reader.readAsArrayBuffer(f);
}
function adminCurr(){
  var h = '<div class="card"><h2>Curriculum & topic codes</h2><p class="sub" style="margin-bottom:10px">Use these topic codes in the spreadsheet\'s <b>topic_code</b> column.</p>';
  SUBJECTS.forEach(function(s){
    h += '<h3 style="margin-top:14px">'+s.icon+' '+s.code+' — '+s.name.en+' ('+s.board+', '+(s.klass==="ALL"?"all ages":"Class "+s.klass)+')</h3>';
    s.chapters.forEach(function(c){
      h += '<div class="sub" style="margin:6px 0 2px"><b>Ch '+c.no+': '+c.name.en+'</b>'+(c.level?' — '+c.level.en:'')+'</div>';
      c.topics.forEach(function(tp){
        var qn = allQuestions().filter(function(q){ return q.topic===tp.code; }).length;
        h += '<div class="sub" style="padding-left:16px"><code>'+tp.code+'</code> — '+tp.name.en+' ('+qn+' q)</div>';
      });
    });
  });
  h += '</div>';
  return h;
}
